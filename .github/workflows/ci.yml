name: Agnetic OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check agents/ dashboard/ services/
      - run: ruff format --check agents/ dashboard/ services/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest pytest-asyncio pytest-aiohttp pytest-cov httpx pyyaml aiohttp
      - run: pytest tests/ -v --cov=agents --cov=services --cov=dashboard --cov-report=xml
      - uses: codecov/codecov-action@v4

  build-deb:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: make deb
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: dist/*.deb

  build-go:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: cd cli && go build -o agneticctl .

  build-rust:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - run: ~/.cargo/bin/cargo build --release --manifest-path staragent/Cargo.toml
